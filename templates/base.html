<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoReward - Smart Waste Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="theme-color" content="#2E7D32">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    {% if request.path != '/' and request.path != '/login' and request.path != '/signup' %}
    <header class="navbar glass">
        <div class="nav-container">
            <a href="/dashboard" class="logo">
                <i data-lucide="leaf"></i>
                <span>EcoReward</span>
            </a>
            <nav class="nav-links">
                <a href="/dashboard" class="nav-link {{ 'active' if request.path == '/dashboard' }}">
                    <i data-lucide="home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/wallet" class="nav-link {{ 'active' if request.path == '/wallet' }}">
                    <i data-lucide="wallet"></i>
                    <span>Wallet</span>
                </a>
                <a href="/redeem" class="nav-link {{ 'active' if request.path == '/redeem' }}">
                    <i data-lucide="qr-code"></i>
                    <span>Redeem</span>
                </a>
                <a href="/leaderboard" class="nav-link {{ 'active' if request.path == '/leaderboard' }}">
                    <i data-lucide="trophy"></i>
                    <span>Leaderboard</span>
                </a>
                <a href="/profile" class="nav-link {{ 'active' if request.path == '/profile' }}">
                    <i data-lucide="user"></i>
                    <span>Profile</span>
                </a>
                <a href="/logout" class="nav-link logout">
                    <i data-lucide="log-out"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </div>
    </header>
    {% endif %}

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
