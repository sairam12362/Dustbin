{% extends "base.html" %}

{% block content %}
<div style="padding-top: 20px;">
    <div class="card" style="text-align: center; padding: 40px 20px; border-radius: var(--radius-lg); margin-bottom: 30px; background: linear-gradient(135deg, #2E7D32 0%, #4CAF50 100%); color: white;">
        <div style="width: 100px; height: 100px; border-radius: 50%; background: white; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; color: var(--primary); box-shadow: var(--shadow);">
            <i data-lucide="user" style="width: 50px; height: 50px;"></i>
        </div>
        <h2 style="font-size: 24px; margin-bottom: 5px; color: white;">{{ user.name }}</h2>
        <p style="opacity: 0.9; font-size: 14px; color: white;">{{ user.email }}</p>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
        <div class="card" style="padding: 20px; text-align: center;">
            <p style="font-size: 12px; color: var(--text-light); margin-bottom: 5px;">Total Points</p>
            <h3 style="font-size: 20px; color: var(--primary); font-weight: bold;">{{ user.points }}</h3>
        </div>
        <div class="card" style="padding: 20px; text-align: center;">
            <p style="font-size: 12px; color: var(--text-light); margin-bottom: 5px;">Recycled</p>
            <h3 style="font-size: 20px; color: var(--primary); font-weight: bold;">{{ user.items_recycled }}</h3>
        </div>
    </div>

    <div class="space-y-4">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 18px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <i data-lucide="history" style="color: var(--primary);"></i>
                <span style="font-weight: 500;">Reward History</span>
            </div>
            <i data-lucide="chevron-right" style="color: var(--text-light); width: 18px;"></i>
        </div>


        <div class="card" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 18px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <i data-lucide="settings" style="color: var(--primary);"></i>
                <span style="font-weight: 500;">Settings</span>
            </div>
            <i data-lucide="chevron-right" style="color: var(--text-light); width: 18px;"></i>
        </div>

        <div class="card" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 18px; margin-top: 20px;" onclick="location.href='/'">
            <div style="display: flex; align-items: center; gap: 15px; color: #ff4d4d;">
                <i data-lucide="log-out"></i>
                <span style="font-weight: 500;">Logout</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
