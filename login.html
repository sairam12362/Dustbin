{% extends "base.html" %}

{% block content %}
<div style="padding-top: 60px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <a href="/" style="width: 44px; height: 44px; border-radius: 12px; background: white; display: flex; align-items: center; justify-content: center; color: var(--text-dark); border: 1px solid #eee; text-decoration: none;">
            <i data-lucide="chevron-left"></i>
        </a>
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" style="height: 40px;">
    </div>

    <h2 style="font-size: 32px; margin-bottom: 8px;">Welcome Back</h2>
    <p style="color: var(--text-light); margin-bottom: 48px;">Sign in to continue your green journey.</p>

    <form action="/login" method="POST">
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-light);">Email Address</label>
            <div style="position: relative;">
                <i data-lucide="mail" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 20px; color: var(--text-light);"></i>
                <input type="email" name="email" placeholder="email@example.com" required style="width: 100%; padding: 16px 16px 16px 48px; border-radius: 16px; border: 1px solid #eee; outline: none; transition: border-color 0.3s;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='#eee'">
            </div>
        </div>

        <div style="margin-bottom: 40px;">
            <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-light);">Password</label>
            <div style="position: relative;">
                <i data-lucide="lock" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 20px; color: var(--text-light);"></i>
                <input type="password" name="password" placeholder="Your password" required style="width: 100%; padding: 16px 16px 16px 48px; border-radius: 16px; border: 1px solid #eee; outline: none; transition: border-color 0.3s;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='#eee'">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Sign In</button>
    </form>

    <p style="text-align: center; margin-top: 30px; font-size: 14px; color: var(--text-light);">
        Don't have an account? <a href="/signup" style="color: var(--primary); font-weight: 700; text-decoration: none;">Sign Up</a>
    </p>
</div>
{% endblock %}
